title: "cocodding | Portfolio & Blog"
description: "Unity · Android · Flutter 클라이언트 개발자 cocodding의 포트폴리오 & 기술 블로그"
url: "https://cocodding0723.github.io"
baseurl: ""

author:
  name: "cocodding"
  github: "cocodding0723"
  blog: "https://cocodding0723.github.io"
  youtube: "https://www.youtube.com/@coco1895"
  baekjoon: "https://www.acmicpc.net/user/cocodding0723"

# SEO / 소셜 공유 (jekyll-seo-tag 가 사용)
lang: ko_KR                       # og:locale → ko_KR
twitter:
  card: summary_large_image       # 큰 이미지 카드
social:
  name: "cocodding"
  links:                          # JSON-LD sameAs (엔티티 신뢰도)
    - "https://github.com/cocodding0723"
    - "https://www.youtube.com/@coco1895"

# Blog
permalink: /blog/:year/:month/:day/:title/
future: true   # 미래 날짜 포스트도 목록·페이지에 표시 (예: 2026년 글)

# Category definitions (for reference)
blog_categories:
  Dev:       "개발 기술 정리 · TIL · 튜토리얼"
  Project:   "프로젝트 개발 과정 · 회고"
  Algorithm: "알고리즘 풀이"
  Daily:     "일상 · 잡담"
  Essay:     "장문 분석 · 회고 · 생각 정리"

# Markdown
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    block:
      line_numbers: false

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""                    # 모든 페이지: 기본 소셜 공유 이미지
    values:
      image: /assets/images/og-default.png
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

sass:
  sass_dir: _sass
  style: compressed

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
